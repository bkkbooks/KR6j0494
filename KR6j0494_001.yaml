body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯如是我聞一時薄伽梵住舍衛國祇陀園與大苾芻衆千二百五十人俱又與無數菩薩摩訶薩及天龍夜叉八部衆等皆來雲集爾時如來告諸大衆我念往昔住雪山北遊香醉山見一童女百福相好莊嚴其身鹿皮為衣以諸毒蛇而為瓔珞將諸毒蟲虎狼師子前後圍繞常為伴侶飲毒果漿食毒草果彼女見我作如是言仁者聽我宣說一大真言能除世間一切諸毒若人聞此呪及念我名者不被一切諸毒所害爾時童女為我說呪我得聞已常持此呪饒益有情我今當說真言曰怛儞也他唵引一哩蜜帝引底丁一反哩蜜帝一哩帝哩蜜帝引努迷努麼引哩引曳引訥泚訥蹉引哩曳得羯囉抳尼貞反嚩揭囉抳揭濕弭㘑引揭濕弭囉目訖帝二合惡祇惡伽儞惡伽娜惡伽曩伽儞一哩曳一哩一哩曳阿佉夜引曳姶烏合反播夜曳濕吠帝引濕吠多頓嬭阿曩引努囉乞砂二合伺嚩二合訶佛言諸苾芻若人一聞此呪却後七年遠離諸毒若人常念者一切毒蟲及諸毒藥悉不能害若有毒蛇來咬此人者其蛇即爛壞其有受持此呪法者以白物先供養師然後受之法必成就勿於蛇邊念此呪其蛇即死死已令其蘇活呪曰怛儞也他伊哩彌哩誐囉彌左斫骨嚕斫骨魯斫骨論斫骨論誐囉彌抳句吒句吒曳帝娑普吒娑普吒曳帝那揭黎那伽折迦蘭底哩一掣囉佛沙尸怛囉卑怛囉悉普吒悉普吒伺嚩二合訶若人念一遍經年諸毒不中若能常持非言外毒消滅亦除內三毒若惡瘡發背癰腫等病唾之念呪即差一切惡獸來但念七遍即過不能為害若為中毒處於中指上頭第一節文左右手繞瘡逆日轉念呪三七遍即差常念不得高聲高聲則有毒蟲必死若惡蟲死已以此呪解之即活念三七遍解毒呪曰怛儞也他一哩彌哩議哩那伽斫伽蘭底哩一掣囉合沙雞怛吒悉怛吒擔吒悉怛吒伺嚩二合訶若人患發背逆日轉繞倒書一匝即差惡物自出大有神驗佛說是語已大衆歡喜授時而起
